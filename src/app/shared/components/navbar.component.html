<nav class="sticky top-0 z-50 bg-black/95 backdrop-blur-md border-b border-white/10 animate-fade-in-down">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <!-- Logo -->
      <a routerLink="/" class="flex items-center gap-2.5 group">
        <div class="w-9 h-9 bg-gold rounded-xl flex items-center justify-center shadow-lg shadow-yellow-600/30 group-hover:shadow-yellow-600/50 group-hover:scale-110 transition-all duration-200">
          <svg class="w-5 h-5 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <span class="text-xl font-black text-white group-hover:text-gold transition-colors duration-200">Market</span>
      </a>

      <!-- Nav Links -->
      <div class="hidden md:flex items-center gap-1">
        <a routerLink="/" class="px-4 py-2 text-sm font-medium text-gray-400 hover:text-gold hover:bg-white/5 rounded-lg transition-all duration-200">Accueil</a>
        <a routerLink="/products" class="px-4 py-2 text-sm font-medium text-gray-400 hover:text-gold hover:bg-white/5 rounded-lg transition-all duration-200">Collection</a>
        @if (currentUser?.role === 'ADMIN' || currentUser?.role === 'MANAGER') {
          <a routerLink="/admin" class="px-4 py-2 text-sm font-medium text-gray-400 hover:text-gold hover:bg-white/5 rounded-lg transition-all duration-200">Administration</a>
        }
      </div>

      <!-- Right side -->
      <div class="flex items-center gap-3">

        @if (!currentUser) {
          <a routerLink="/auth/login" class="px-4 py-2 text-sm font-medium text-gray-400 hover:text-gold transition-colors duration-200">Connexion</a>
          <a routerLink="/auth/register" class="px-4 py-2 text-sm font-bold text-black bg-gold rounded-xl hover:shadow-lg hover:shadow-yellow-600/30 hover:-translate-y-0.5 transition-all duration-200">S'inscrire</a>
        }

        @if (currentUser) {
          <!-- Notifications -->
          <button class="relative p-2 text-gray-500 hover:text-gold hover:bg-white/5 rounded-lg transition-all duration-200">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
            </svg>
            @if (unreadNotifications > 0) {
              <span class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-gold text-black text-xs rounded-full flex items-center justify-center font-bold">{{ unreadNotifications }}</span>
            }
          </button>

          <!-- User menu -->
          <div class="relative">
            <button (click)="toggleUserMenu()" class="flex items-center gap-2 pl-2 pr-3 py-1.5 rounded-xl hover:bg-white/5 border border-transparent hover:border-white/10 transition-all duration-200">
              <div class="w-8 h-8 bg-gold rounded-lg flex items-center justify-center text-black text-sm font-black shadow">{{ initials }}</div>
              <span class="hidden md:block text-sm font-medium text-gray-300 max-w-28 truncate">{{ fullName }}</span>
              <svg class="w-4 h-4 text-gray-600 transition-transform duration-200" [class.rotate-180]="showUserMenu" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
              </svg>
            </button>

            @if (showUserMenu) {
              <div class="absolute right-0 mt-2 w-56 bg-gray-900 rounded-2xl shadow-2xl border border-white/10 overflow-hidden animate-scale-in">
                <div class="px-4 py-3 border-b border-white/5 bg-white/5">
                  <p class="text-sm font-bold text-white">{{ fullName }}</p>
                  <p class="text-xs text-gold mt-0.5 font-medium">{{ currentUser.role }}</p>
                </div>
                <div class="py-1">
                  <a routerLink="/profile" (click)="showUserMenu = false" class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-400 hover:bg-white/5 hover:text-gold transition-colors duration-150">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    Mon profil
                  </a>
                  <a routerLink="/orders" (click)="showUserMenu = false" class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-400 hover:bg-white/5 hover:text-gold transition-colors duration-150">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                    Mes commandes
                  </a>
                  <div class="border-t border-white/5 my-1"></div>
                  <button (click)="logout()" class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-red-400 hover:bg-white/5 transition-colors duration-150">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    Déconnexion
                  </button>
                </div>
              </div>
            }
          </div>
        }
      </div>
    </div>
  </div>
</nav>
