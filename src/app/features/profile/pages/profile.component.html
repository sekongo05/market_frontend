<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <h1 class="text-4xl font-bold text-gray-900 mb-8">Mon Profil</h1>

  <div *ngIf="successMessage" class="mb-4 p-4 bg-green-50 border border-green-200 rounded-lg">
    <p class="text-green-800">{{ successMessage }}</p>
  </div>

  <div *ngIf="errorMessage" class="mb-4 p-4 bg-red-50 border border-red-200 rounded-lg">
    <p class="text-red-800">{{ errorMessage }}</p>
  </div>

  <div *ngIf="!loading && user" class="space-y-8">
    <!-- Information générales -->
    <div class="bg-white rounded-lg shadow-md p-6">
      <h2 class="text-2xl font-bold text-gray-900 mb-6">Informations personnelles</h2>
      <form [formGroup]="profileForm" (ngSubmit)="updateProfile()" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Nom</label>
            <input
              type="text"
              formControlName="nom"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-blue-500 focus:border-blue-500"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Prénom</label>
            <input
              type="text"
              formControlName="prenom"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-blue-500 focus:border-blue-500"
            />
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
          <input
            type="email"
            [value]="user.email"
            disabled
            class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50 text-gray-600"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Téléphone</label>
          <input
            type="tel"
            formControlName="phone"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-blue-500 focus:border-blue-500"
          />
        </div>

        <div class="flex justify-end pt-4">
          <button
            type="submit"
            [disabled]="loading"
            class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 disabled:bg-gray-400"
          >
            {{ loading ? 'Mise à jour...' : 'Mettre à jour' }}
          </button>
        </div>
      </form>
    </div>

    <!-- Sécurité -->
    <div class="bg-white rounded-lg shadow-md p-6">
      <h2 class="text-2xl font-bold text-gray-900 mb-6">Changer le mot de passe</h2>
      <form [formGroup]="passwordForm" (ngSubmit)="changePassword()" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Ancien mot de passe</label>
          <input
            type="password"
            formControlName="oldPassword"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-blue-500 focus:border-blue-500"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Nouveau mot de passe</label>
          <input
            type="password"
            formControlName="newPassword"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-blue-500 focus:border-blue-500"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Confirmer le mot de passe</label>
          <input
            type="password"
            formControlName="confirmPassword"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-blue-500 focus:border-blue-500"
          />
        </div>

        <div class="flex justify-end pt-4">
          <button
            type="submit"
            [disabled]="loading"
            class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 disabled:bg-gray-400"
          >
            {{ loading ? 'Changement...' : 'Changer le mot de passe' }}
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Loading state -->
  <div *ngIf="loading" class="flex justify-center py-12">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
  </div>
</div>
